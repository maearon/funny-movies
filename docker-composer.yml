services:
  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway.Dockerfile
    ports:
      - "9000:9000"
    env_file:
      - ./apps/api-gateway/.env
    environment:
      - SERVICE_RAILS_URL=http://user-service:3000
    networks:
      - remitano-test-network

  notification-service:
    build:
      context: .
      dockerfile: docker/notification-service.Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - ./apps/notification-service/.env
    environment:
      - PORT=3002
    volumes:
      - ./apps/notification-service:/app
    command: npm run dev
    networks:
      - remitano-test-network 

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - SERVICE_API_URL=http://localhost:3000
    networks:
      - remitano-test-network

  service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/service:/app
    workdir: /app
    env_file:
      - ./apps/service/.env
    environment:
      - PORT=3000
    networks:
      - remitano-test-network