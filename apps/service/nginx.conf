events {}

http {
  server {
    listen 80;
    server_name nguyenducmanh.duckdns.org;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name nguyenducmanh.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/nguyenducmanh.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nguyenducmanh.duckdns.org/privkey.pem;

    location / {
      proxy_pass http://service:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}