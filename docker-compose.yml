services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - SERVICE_API_URL=http://localhost:3000
    networks:
      - remitano-test-network

  service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/service:/app
    working_dir: /app
    env_file:
      - ./apps/service/.env
    environment:
      - PORT=3000
    networks:
      - remitano-test-network

networks:
  remitano-test-network:
    driver: bridge